version: '3.8'

services:
  # Trinity Core Platform
  trinity-core:
    image: trinity/core:latest
    container_name: trinity-core
    ports:
      - "8001:8001"  # Main API
    environment:
      - NODE_ENV=production
      - TRINITY_MODE=production
    networks:
      - trinity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Agent A - Ledger Control
  agent-a:
    image: ghcr.io/trinity/agent-a:1.0.0
    container_name: trinity-agent-a
    ports:
      - "9104:9104"  # Prometheus metrics
    environment:
      - AGENT_ID=agent-a
      - NATS_URL=nats://nats:4222
    networks:
      - trinity-network
    restart: unless-stopped
    depends_on:
      - nats
      - trinity-core

  # Agent B - ML Infrastructure  
  agent-b:
    image: ghcr.io/trinity/agent-b:1.0.0
    container_name: trinity-agent-b
    ports:
      - "9105:9105"  # Prometheus metrics
    environment:
      - AGENT_ID=agent-b
      - NATS_URL=nats://nats:4222
    networks:
      - trinity-network
    restart: unless-stopped
    depends_on:
      - nats
      - trinity-core

  # Agent C - Compliance Insight
  agent-c:
    image: ghcr.io/trinity/agent-c:1.0.0
    container_name: trinity-agent-c
    ports:
      - "9106:9106"  # Prometheus metrics
    environment:
      - AGENT_ID=agent-c
      - NATS_URL=nats://nats:4222
    networks:
      - trinity-network
    restart: unless-stopped
    depends_on:
      - nats
      - trinity-core

  # NATS Message Broker
  nats:
    image: nats:2.10-alpine
    container_name: trinity-nats
    ports:
      - "4222:4222"  # Client connections
      - "8222:8222"  # Management interface
    command: ["--jetstream", "--http_port", "8222"]
    networks:
      - trinity-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: trinity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - trinity-network
    restart: unless-stopped

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: trinity-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - trinity-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  trinity-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  prometheus_data:
  grafana_data: 